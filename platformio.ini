; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-poe]
platform = espressif32
board = esp32-poe
framework = arduino
monitor_speed = 115200
upload_speed = 115200
build_flags =
  -D USE_ETHERNET=1
  -D WEBSERVER_MAX_POST_ARGS=2000
  ; 16KB loop stack: web handlers + DMX preset/fade paths run deep on loopTask
  -D ARDUINO_LOOP_STACK_SIZE=16384
  ; Silence harmless NVS NOT_FOUND spam from Preferences (missing key = use default)
  -D CORE_DEBUG_LEVEL=0
lib_deps =
  bblanchon/ArduinoJson@^7.0.0
  knolleary/PubSubClient@^2.8
extra_scripts =
  pre:scripts/build_web.py
  post:scripts/post_build_copy.py

[platformio]
default_envs = esp32-poe

[env:esp32dev-wifi]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.partitions = partitions.csv
build_flags =
  -D USE_ETHERNET=0
  -D WEBSERVER_MAX_POST_ARGS=2000
  -D ARDUINO_LOOP_STACK_SIZE=16384
  -D CORE_DEBUG_LEVEL=0
lib_deps =
  bblanchon/ArduinoJson@^7.0.0
  knolleary/PubSubClient@^2.8
extra_scripts = post:scripts/post_build_copy.py
